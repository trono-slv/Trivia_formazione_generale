<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classifica | Quiz SSL D.Lgs. 81/2008</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    :root {
      --bg:      #0a0f1e;
      --surface: #111827;
      --glass:   rgba(255,255,255,0.04);
      --border:  rgba(255,255,255,0.08);
      --accent:  #f59e0b;
      --accent2: #3b82f6;
      --success: #10b981;
      --danger:  #ef4444;
      --text:    #f1f5f9;
      --muted:   #94a3b8;
    }

    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    html { scroll-behavior:smooth; }

    body {
      font-family:'Inter', system-ui, sans-serif;
      background-color:var(--bg);
      color:var(--text);
      min-height:100vh;
    }

    body::before {
      content:'';
      position:fixed;
      inset:0;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% 10%, rgba(59,130,246,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(245,158,11,0.06) 0%, transparent 60%);
      pointer-events:none;
      z-index:0;
    }

    .glass {
      background:var(--glass);
      border:1px solid var(--border);
      backdrop-filter:blur(12px);
      -webkit-backdrop-filter:blur(12px);
    }

    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.15); border-radius:3px; }

    .fade-in {
      animation:fadeIn 0.4s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity:0; transform:translateY(8px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .lb-row {
      display:flex;
      align-items:center;
      gap:0.75rem;
      padding:0.875rem 1.125rem;
      border-radius:0.875rem;
      border:1px solid var(--border);
      background:rgba(255,255,255,0.02);
      margin-bottom:0.5rem;
      transition:background 0.2s;
    }
    .lb-row:hover { background:rgba(255,255,255,0.04); }
    .lb-row.gold   { border-color:#f59e0b; background:rgba(245,158,11,0.07); }
    .lb-row.silver { border-color:#94a3b8; background:rgba(148,163,184,0.06); }
    .lb-row.bronze { border-color:#b45309; background:rgba(180,83,9,0.06); }

    .stat-card {
      background:rgba(255,255,255,0.03);
      border:1px solid var(--border);
      border-radius:0.875rem;
      padding:1rem;
      text-align:center;
    }

    .btn-back {
      display:inline-flex;
      align-items:center;
      gap:0.5rem;
      color:var(--accent2);
      font-size:0.9rem;
      text-decoration:none;
      transition:opacity 0.2s;
    }
    .btn-back:hover { opacity:0.75; }

    .podium-bar {
      border-radius:0.5rem 0.5rem 0 0;
      width:70px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-end;
      padding-bottom:0.75rem;
    }

    .countdown-badge {
      display:inline-flex;
      align-items:center;
      gap:0.4rem;
      background:rgba(59,130,246,0.1);
      border:1px solid rgba(59,130,246,0.25);
      border-radius:2rem;
      padding:0.3rem 0.75rem;
      font-size:0.75rem;
      color:var(--accent2);
      font-variant-numeric:tabular-nums;
    }

    @media(max-width:640px) {
      .lb-row { padding:0.625rem 0.875rem; gap:0.5rem; }
    }
  </style>
</head>
<body>

<div class="relative z-10 max-w-3xl mx-auto px-4 py-8 md:py-14">

  <!-- HEADER -->
  <div class="mb-8 fade-in">
    <a href="index.html" class="btn-back mb-5 inline-flex">
      ← Torna al Quiz
    </a>
    <div class="mt-4 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3">
      <div>
        <h1 class="text-2xl md:text-3xl font-extrabold mb-1">
          🏆 Classifica
          <span style="background:linear-gradient(90deg,var(--accent2),var(--accent));
                       -webkit-background-clip:text;-webkit-text-fill-color:transparent;">
            Giornaliera
          </span>
        </h1>
        <p class="text-sm" style="color:var(--muted)">
          Aggiornata ogni 30 secondi · <span id="today-date"></span>
        </p>
      </div>
      <div class="countdown-badge">
        🕐 Reset in <span id="countdown">--:--:--</span>
      </div>
    </div>
  </div>

  <!-- STAT CARDS -->
  <div class="grid grid-cols-2 sm:grid-cols-4 gap-3 mb-8 fade-in" id="stat-row"></div>

  <!-- PODIO -->
  <div class="glass rounded-2xl p-5 mb-6 fade-in">
    <p class="text-xs font-semibold uppercase tracking-widest mb-4" style="color:var(--muted)">
      Top 3 di oggi
    </p>
    <div class="flex items-end justify-center gap-6" id="podio-container" style="min-height:140px"></div>
  </div>

  <!-- TABELLA -->
  <div class="glass rounded-2xl p-5 fade-in">
    <div class="flex items-center justify-between mb-4">
      <p class="text-xs font-semibold uppercase tracking-widest" style="color:var(--muted)">
        Tutti i risultati
      </p>
      <span class="text-xs" style="color:var(--muted)" id="entry-count"></span>
    </div>

    <div id="lb-container"></div>

    <div id="empty-state" style="display:none" class="text-center py-10">
      <p class="text-4xl mb-3">📭</p>
      <p class="font-semibold mb-1">Nessun risultato oggi</p>
      <p class="text-sm" style="color:var(--muted)">
        Completa il quiz per essere il primo in classifica!
      </p>
      <a href="index.html" class="btn-back mt-4 inline-flex justify-center">
        → Vai al Quiz
      </a>
    </div>
  </div>

  <!-- FOOTER -->
  <p class="text-center text-xs mt-8" style="color:var(--muted)">
    La classifica si azzera ogni giorno a mezzanotte
  </p>

</div>

<script>
  /* ─── CHIAVE: deve coincidere con index.html ─── */
  const LB_KEY = 'ssl_quiz_leaderboard_v1';

  /* ─── HELPERS ─── */
  function getToday() {
    return new Date().toLocaleDateString('it-IT');
  }

  function loadLeaderboard() {
    try {
      return JSON.parse(localStorage.getItem(LB_KEY)) || { entries: [] };
    } catch { return { entries: [] }; }
  }

  function formatTime(t) {
    if (!t) return '--';
    return t;
  }

  /* ─── COUNTDOWN ─── */
  function updateCountdown() {
    const now       = new Date();
    const midnight  = new Date(now);
    midnight.setHours(24, 0, 0, 0);
    const diff      = midnight - now;
    const h  = String(Math.floor(diff / 3600000)).padStart(2,'0');
    const m  = String(Math.floor((diff % 3600000) / 60000)).padStart(2,'0');
    const s  = String(Math.floor((diff % 60000) / 1000)).padStart(2,'0');
    document.getElementById('countdown').textContent = `${h}:${m}:${s}`;
  }

  /* ─── RENDER PRINCIPALE ─── */
  function render() {
    const lb      = loadLeaderboard();
    const today   = getToday();
    const entries = lb.entries
      .filter(e => e.date === today)
      .sort((a, b) => b.score - a.score)
      .slice(0, 50);

    document.getElementById('today-date').textContent = today;
    renderStats(entries);
    renderPodio(entries);
    renderTable(entries);
  }

  /* ─── STAT CARDS ─── */
  function renderStats(entries) {
    const row      = document.getElementById('stat-row');
    const total    = entries.length;
    const passed   = entries.filter(e => e.passed).length;
    const avgScore = total
      ? Math.round(entries.reduce((a, b) => a + b.raw, 0) / total)
      : 0;
    const best     = total
      ? Math.max(...entries.map(e => e.score))
      : 0;

    const data = [
      { label:'Partecipanti',   value:total,             color:'var(--accent2)' },
      { label:'Superati',       value:passed,            color:'var(--success)' },
      { label:'Media corrette', value:`${avgScore}/30`,  color:'var(--accent)'  },
      { label:'Record oggi',    value:`${best}pt`,       color:'var(--text)'    }
    ];

    row.innerHTML = data.map(d => `
      <div class="stat-card">
        <div class="text-xl font-bold" style="color:${d.color}">${d.value}</div>
        <div class="text-xs mt-1" style="color:var(--muted)">${d.label}</div>
      </div>
    `).join('');
  }

  /* ─── PODIO ─── */
  function renderPodio(entries) {
    const container = document.getElementById('podio-container');
    const top3      = entries.slice(0, 3);

    if (top3.length === 0) {
      container.innerHTML =
        '<p class="text-sm w-full text-center" style="color:var(--muted)">Nessun dato oggi</p>';
      return;
    }

    /* Ordine visivo: 2° | 1° | 3° */
    const visual  = [top3[1], top3[0], top3[2]].filter(Boolean);
    const heights = ['80px','110px','60px'];
    const colors  = ['#94a3b8','#f59e0b','#b45309'];
    const medals  = ['🥈','🥇','🥉'];
    const ranks   = [2, 1, 3];

    container.innerHTML = visual.map((e, vi) => `
      <div class="flex flex-col items-center gap-2">
        <span class="text-lg">${medals[vi]}</span>
        <span class="text-xs font-semibold text-center max-w-[80px] truncate"
              style="color:var(--text)" title="${e.name}">
          ${e.name.split(' ')[0]}
        </span>
        <span class="text-xs font-bold" style="color:${colors[vi]}">${e.score}pt</span>
        <div class="podium-bar"
             style="height:${heights[vi]};background:${colors[vi]}22;border:1px solid ${colors[vi]}44;">
          <span class="text-xs font-bold" style="color:${colors[vi]}">#${ranks[vi]}</span>
        </div>
      </div>
    `).join('');
  }

  /* ─── TABELLA ─── */
  function renderTable(entries) {
    const container  = document.getElementById('lb-container');
    const emptyState = document.getElementById('empty-state');
    const countEl    = document.getElementById('entry-count');

    countEl.textContent = `${entries.length} partecipant${entries.length !== 1 ? 'i' : 'e'}`;

    if (entries.length === 0) {
      container.innerHTML      = '';
      emptyState.style.display = 'block';
      return;
    }
    emptyState.style.display = 'none';

    const medals = ['🥇','🥈','🥉'];

    container.innerHTML = entries.map((e, i) => {
      const cls =
        i === 0 ? 'lb-row gold'   :
        i === 1 ? 'lb-row silver' :
        i === 2 ? 'lb-row bronze' : 'lb-row';

      return `
        <div class="${cls}">
          <span class="text-base w-7 flex-shrink-0 font-bold" style="color:var(--muted)">
            ${medals[i] ?? `#${i + 1}`}
          </span>
          <div class="flex-1 min-w-0">
            <p class="font-semibold text-sm truncate">${e.name}</p>
            <p class="text-xs" style="color:var(--muted)">
              ${e.raw}/30 corrette · ${formatTime(e.time)}
            </p>
          </div>
          <div class="text-right flex-shrink-0">
            <p class="font-bold text-sm" style="color:var(--accent)">${e.score}pt</p>
            <p class="text-xs" style="color:${e.passed ? 'var(--success)' : 'var(--danger)'}">
              ${e.passed ? '✅ Superato' : '❌ Non sup.'}
            </p>
          </div>
        </div>
      `;
    }).join('');
  }

  /* ─── INIT ─── */
  render();
  updateCountdown();
  setInterval(updateCountdown, 1000);
  setInterval(render, 30000);
</script>
</body>
</html>
